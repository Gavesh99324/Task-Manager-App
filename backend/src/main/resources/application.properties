# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration — MongoDB Atlas
# Set MONGODB_URI environment variable, or create application-local.properties (see README)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DB:taskmanager}

# JWT Configuration
# Set JWT_SECRET environment variable, or define it in application-local.properties
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Pagination Defaults
app.pagination.default-page-size=10
app.pagination.max-page-size=100

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.taskmanager=INFO
logging.level.org.springframework.security=WARN
